services:

  web:
    image: nginx
    ports:
      - "8092:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html

  backend:
    build: ./backend   # 👈 QUESTO è il fix
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: mongo:4.4
    ports:
      - "27018:27017"
